<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to 5-String Bass TAB</title>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>
    <script src="https://unpkg.com/tone"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        #debug { background: #000; color: #0f0; padding: 10px; border: 1px solid #58a6ff; font-family: monospace; margin-bottom: 20px; white-space: pre-wrap; }
        .midi-library { background: #161b22; padding: 20px; border-radius: 8px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .file-card { background: #0d1117; border: 1px solid #30363d; padding: 15px; border-radius: 8px; cursor: pointer; }
        .file-card:hover { border-color: #58a6ff; }
        .results-section { display: none; margin-top: 20px; }
        .tablature-container { background: #161b22; padding: 20px; overflow-x: auto; margin-top: 20px; }
        .tab-note { color: #f0883e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 MIDI to 5-String Bass TAB</h1>
        
        <div id="debug">System Check: Starting...</div>

        <div class="midi-library">
            <h2>Available MIDI Files</h2>
            <div id="fileGrid" class="file-grid">Loading Files...</div>
        </div>

        <div id="results" class="results-section">
            <h2 id="currentFileName"></h2>
            <div class="tablature-container" id="tabContent"></div>
        </div>
    </div>

    <script>
        const debugEl = document.getElementById('debug');
        function log(msg) {
            console.log(msg);
            debugEl.innerText += "\n> " + msg;
        }

        window.onerror = (m, u, l) => log("GLOBAL ERROR: " + m + " at line " + l);

        log("Protocol: " + window.location.protocol);

        async function loadLibrary() {
            log("Attempting to fetch midi-files.json...");
            try {
                const response = await fetch('midi-files.json?t=' + Date.now());
                log("Fetch status: " + response.status);
                if (!response.ok) throw new Error("JSON not found");
                
                const data = await response.json();
                log("JSON parsed. Files found: " + (data.files ? data.files.length : 0));
                
                const grid = document.getElementById('fileGrid');
                grid.innerHTML = '';
                
                if (data.files && data.files.length > 0) {
                    data.files.forEach(f => {
                        const card = document.createElement('div');
                        card.className = 'file-card';
                        card.innerHTML = `<strong>${f.displayName}</strong><br><small>${f.size}</small>`;
                        card.onclick = () => loadMidi(f.name);
                        grid.appendChild(card);
                    });
                    log("Grid rendered.");
                } else {
                    grid.innerText = "No files found in JSON.";
                }
            } catch (e) {
                log("Library Error: " + e.message);
            }
        }

        async function loadMidi(filename) {
            log("Loading MIDI: " + filename);
            try {
                const response = await fetch('midi/' + filename);
                if (!response.ok) throw new Error("File not found");
                const arrayBuffer = await response.arrayBuffer();
                const midi = new Midi(arrayBuffer);
                log("MIDI parsed: " + midi.name);
                
                document.getElementById('results').style.display = 'block';
                document.getElementById('currentFileName').innerText = filename;
                
                // Simple display logic
                const track = midi.tracks.find(t => t.notes.length > 0);
                document.getElementById('tabContent').innerText = track 
                    ? `Found track with ${track.notes.length} notes.` 
                    : "No notes found in any track.";
                
            } catch (e) {
                log("Load Error: " + e.message);
            }
        }

        // Run
        if (window.location.protocol === 'file:') {
            log("WARNING: file:// detected. Fetch will likely fail.");
        }
        
        loadLibrary();
    </script>
</body>
</html>
