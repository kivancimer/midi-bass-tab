<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to 5-String Bass TAB</title>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>
    <script src="https://unpkg.com/tone"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; font-size: 2.2em; text-shadow: 0 0 20px rgba(88,166,255,0.3); }
        
        .alert { background: rgba(240, 136, 62, 0.1); border: 1px solid #f0883e; color: #f0883e; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        
        .midi-library { background: rgba(22,27,34,0.8); border: 1px solid #30363d; border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .file-card { background: #0d1117; border: 1px solid #30363d; padding: 18px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; }
        .file-card:hover { border-color: #58a6ff; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(88,166,255,0.15); }

        .results-section { display: none; }
        .controls-panel { background: rgba(22,27,34,0.9); border: 1px solid #30363d; border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .control-btn { background: linear-gradient(135deg, #1f6feb, #58a6ff); border: none; padding: 12px 28px; color: white; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
        .control-btn:disabled { background: #30363d; cursor: not-allowed; opacity: 0.5; }
        
        .progress-container { width: 100%; margin: 15px 0; }
        .progress-bar { width: 100%; height: 10px; background: #21262d; border-radius: 5px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #1f6feb, #58a6ff); width: 0%; }

        .tablature-panel { background: rgba(22,27,34,0.9); border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .tablature-scroll-container { overflow-x: scroll; position: relative; width: 100%; min-height: 300px; padding: 30px 0; }
        .tablature-content { display: flex; position: relative; }
        .string-labels { position: sticky; left: 0; z-index: 10; background: #0d1117; display: flex; flex-direction: column; min-width: 60px; padding-left: 10px; }
        .string-label { color: #58a6ff; font-weight: bold; height: 50px; display: flex; align-items: center; }
        .tab-lines-area { position: relative; min-width: 1000px; }
        .tab-string-line { height: 50px; border-bottom: 1px solid #30363d; position: relative; display: flex; align-items: center; }
        .tab-note { position: absolute; background: #f0883e; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; transform: translateX(-50%); cursor: pointer; z-index: 5; }
        .tab-note.active { background: #238636; box-shadow: 0 0 15px #238636; scale: 1.2; }
        .position-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #58a6ff; z-index: 10; display: none; }

        .optimization-panel { background: rgba(13,17,23,0.8); border: 1px solid #30363d; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px; border-radius: 6px; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { border: 4px solid rgba(88,166,255,0.1); border-top: 4px solid #58a6ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 MIDI to 5-String Bass TAB</h1>
        
        <div id="protocolAlert" class="alert">
            <strong>⚠️ Security Notice:</strong> Loading from <code>file://</code> is limited. Run <code>python -m http.server</code> for full access.
        </div>

        <div id="midiLibrary" class="midi-library">
            <div class="file-grid" id="fileGrid"></div>
        </div>

        <div id="results" class="results-section">
            <div class="optimization-panel">
                <div class="controls-row">
                    <label>Bass Type:</label>
                    <select id="bassType"><option value="5">5-String (B-E-A-D-G)</option><option value="4">4-String (E-A-D-G)</option></select>
                    <label>Mode:</label>
                    <select id="optimizationMode"><option value="smart">Smart Flow</option><option value="lowest">Lowest Frets</option></select>
                    <button class="control-btn" onclick="applyOptimization()">🔄 Re-Optimize</button>
                </div>
            </div>

            <div class="controls-panel">
                <div class="controls-row">
                    <button class="control-btn" id="playBtn">▶ Play</button>
                    <button class="control-btn" id="stopBtn">⏹ Stop</button>
                    <div style="margin-left: 20px;">
                        Track: <select id="trackSelect"></select>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
            </div>

            <div class="tablature-panel">
                <div id="tablatureContainer" class="tablature-scroll-container">
                    <div class="tablature-content">
                        <div id="stringLabels" class="string-labels"></div>
                        <div id="tabLinesArea" class="tab-lines-area">
                            <div id="positionMarker" class="position-marker"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

    <script>
        const INLINED_DATABASE = [
            { "name": "Do i do Bass.mid", "displayName": "Do i do Bass", "size": "13.8 KB" },
            { "name": "Lavender Haze  Taylor Swift Funk Cover  Strutman Lane [bass].mid", "displayName": "Lavender Haze Taylor Swift Funk Cover Strutman Lane", "size": "4.3 KB" },
            { "name": "Maroon 5 - Wait (Chromeo Remix) (Audio) [bass].mid", "displayName": "Maroon 5 - Wait (Chromeo Remix) (Audio)", "size": "6.9 KB" },
            { "name": "Obsessed.mid", "displayName": "Obsessed", "size": "7.4 KB" },
            { "name": "Show Me How.mid", "displayName": "Show Me How", "size": "10.6 KB" },
            { "name": "Up Top - Busty and the bass.mid", "displayName": "Up Top - Busty and the bass", "size": "17.7 KB" }
        ];

        const CONFIG = {
            tuning5: [{n:'G', m:43}, {n:'D', m:38}, {n:'A', m:33}, {n:'E', m:28}, {n:'B', m:23}],
            tuning4: [{n:'G', m:43}, {n:'D', m:38}, {n:'A', m:33}, {n:'E', m:28}],
            pxPerSec: 100
        };

        let midiData = null;
        let currentTrack = null;
        let isPlaying = false;
        let startTime = 0;
        let animFrame = null;
        let audioCtx = null;

        function renderLibrary() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = INLINED_DATABASE.map(f => `
                <div class="file-card" onclick="loadMidiFile('${f.name}')">
                    <h3>${f.displayName}</h3>
                    <span>${f.size}</span>
                </div>
            `).join('');
        }

        async function loadMidiFile(name) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const res = await fetch(`midi/${name}`);
                if (!res.ok) throw new Error("Fetch failed");
                const buffer = await res.arrayBuffer();
                const midi = new Midi(buffer);
                midiData = midi;
                
                const trackSelect = document.getElementById('trackSelect');
                trackSelect.innerHTML = midi.tracks.map((t, i) => `<option value="${i}">${t.name || 'Track '+i} (${t.notes.length} notes)</option>`).join('');
                
                document.getElementById('midiLibrary').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                
                selectTrack(midi.tracks.findIndex(t => t.notes.length > 0));
            } catch (e) {
                alert("Cannot load file directly. Please use a local server as instructed.");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function selectTrack(idx) {
            currentTrack = midiData.tracks[idx];
            applyOptimization();
        }

        function applyOptimization() {
            const is5 = document.getElementById('bassType').value === '5';
            const tuning = is5 ? CONFIG.tuning5 : CONFIG.tuning4;
            const mode = document.getElementById('optimizationMode').value;
            
            const labels = document.getElementById('stringLabels');
            labels.innerHTML = tuning.map(s => `<div class="string-label">${s.n}</div>`).join('');
            
            const area = document.getElementById('tabLinesArea');
            area.innerHTML = '<div id="positionMarker" class="position-marker"></div>';
            
            const lines = tuning.map((s, i) => {
                const line = document.createElement('div');
                line.className = 'tab-string-line';
                area.appendChild(line);
                return line;
            });

            currentTrack.notes.forEach(note => {
                let bestPos = null;
                tuning.forEach((s, i) => {
                    const fret = note.midi - s.m;
                    if (fret >= 0 && fret <= 24) {
                        if (!bestPos || fret < bestPos.fret) bestPos = { string: i, fret };
                    }
                });

                if (bestPos) {
                    const noteEl = document.createElement('div');
                    noteEl.className = 'tab-note';
                    noteEl.style.left = (note.time * CONFIG.pxPerSec) + 'px';
                    noteEl.innerText = bestPos.fret;
                    noteEl.dataset.time = note.time;
                    lines[bestPos.string].appendChild(noteEl);
                }
            });
            area.style.width = (midiData.duration * CONFIG.pxPerSec + 500) + 'px';
        }

        // Playback logic
        document.getElementById('playBtn').onclick = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isPlaying = true;
            startTime = audioCtx.currentTime;
            document.getElementById('positionMarker').style.display = 'block';
            animate();
        };

        document.getElementById('stopBtn').onclick = () => {
            isPlaying = false;
            cancelAnimationFrame(animFrame);
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('positionMarker').style.display = 'none';
        };

        function animate() {
            if (!isPlaying) return;
            const now = audioCtx.currentTime - startTime;
            const progress = (now / midiData.duration) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const markerPos = now * CONFIG.pxPerSec;
            document.getElementById('positionMarker').style.left = markerPos + 'px';
            
            document.querySelectorAll('.tab-note').forEach(n => {
                if (Math.abs(parseFloat(n.dataset.time) - now) < 0.1) n.classList.add('active');
                else n.classList.remove('active');
            });

            if (now < midiData.duration) animFrame = requestAnimationFrame(animate);
            else isPlaying = false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.protocol === 'file:') document.getElementById('protocolAlert').style.display = 'block';
            renderLibrary();
        });
    </script>
</body>
</html>
